<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Iniciar sesión</title>
		{% load static %}
		<link rel="stylesheet" href="{% static 'core/css/login.css' %}">
	</head>
	<body>
		<div class="login-page">
					<div class="login-split">
						<div class="login-right">
					<div class="login-box">
						<div class="login-logo" aria-hidden="true"></div>
						<h2 class="title">Iniciar Sesión</h2>
						<p class="subtitle">Hoy es un buen día para completar tu lista</p>
						<div class="icon-row" aria-hidden="true">
							<div class="icon-circle" title="Cámara">
								<!-- camera icon -->
								<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 7h3l2-2h6l2 2h3v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7z" stroke="var(--accent-dark)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="12" cy="13" r="3" stroke="var(--accent-dark)" stroke-width="1.2" fill="none"/></svg>
							</div>
							<div class="icon-circle" title="Pantalla">
								<!-- monitor icon -->
								<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="4" width="18" height="12" rx="1" stroke="var(--accent-dark)" stroke-width="1.2" fill="none"/><path d="M8 20h8" stroke="var(--accent-dark)" stroke-width="1.2" stroke-linecap="round"/></svg>
							</div>
							<div class="icon-circle" title="Vehículo">
								<!-- car icon -->
								<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 13l2-4h14l2 4v4a1 1 0 0 1-1 1h-1a1 1 0 0 1-1-1v-1H6v1a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-4z" stroke="var(--accent-dark)" stroke-width="1.2" fill="none"/><circle cx="7.5" cy="12.5" r="1.5" stroke="var(--accent-dark)" stroke-width="1.2" fill="none"/><circle cx="16.5" cy="12.5" r="1.5" stroke="var(--accent-dark)" stroke-width="1.2" fill="none"/></svg>
							</div>
						</div>

						{% if error %}
							<p class="error">{{ error }}</p>
						{% endif %}

									<form method="post" class="login-form">
							{% csrf_token %}
							<div class="input-with-icon">
								<span class="icon">
									<!-- user icon -->
									<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5z" stroke="#0b6b4f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 21c0-3.866 3.582-7 9-7s9 3.134 9 7" stroke="#0b6b4f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
								</span>
								<input type="email" name="{{ form.correo.html_name }}" value="{{ form.correo.value|default_if_none:'' }}" placeholder="Usuario" class="input-field" />
							</div>

							<div class="input-with-icon">
								<span class="icon">
									<!-- lock icon -->
									<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="11" width="18" height="10" rx="2" stroke="#0b6b4f" stroke-width="1.2"/><path d="M7 11V8a5 5 0 0110 0v3" stroke="#0b6b4f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
								</span>
								<input type="password" name="{{ form.password.html_name }}" value="{{ form.password.value|default_if_none:'' }}" placeholder="Contraseña" class="input-field" />
							</div>

							<div class="form-row">
								<button type="submit" class="btn-primary">Ingresar</button>
							</div>
												</form>
											</div>
										</div>
									</div>
								</div>
	</body>
</html>
